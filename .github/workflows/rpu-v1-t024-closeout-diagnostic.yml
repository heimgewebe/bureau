name: RPU T024 closeout diagnostic

on:
  pull_request:
    paths:
      - "registry/queue.json"
      - "registry/tasks/RPU-V1-T024.json"
      - ".github/workflows/rpu-v1-t024-closeout-diagnostic.yml"

permissions:
  contents: read

jobs:
  validate-log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e '.[dev]'
      - name: Capture complete validation output
        shell: bash
        run: |
          set +e
          make validate > validation.log 2>&1
          status=$?
          printf '%s\n' "$status" > validation-exit-code.txt
          exit 0
      - name: Upload validation evidence
        uses: actions/upload-artifact@v7
        with:
          name: rpu-v1-t024-closeout-diagnostic
          path: |
            validation.log
            validation-exit-code.txt
          retention-days: 1
