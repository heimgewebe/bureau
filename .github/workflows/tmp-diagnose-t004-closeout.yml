name: Temporary T004 closeout diagnostic

on:
  push:
    branches:
      - tasks/repoground-t004-closeout-v1

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python -m pip install -e '.[dev]'
      - name: Capture validation failure
        run: |
          set -u
          if make validate > /tmp/t004-validate.log 2>&1; then
            printf '%s\n' 'VALIDATE_PASS' > t004-validation-tail.txt
          else
            tail -n 160 /tmp/t004-validate.log > t004-validation-tail.txt
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add t004-validation-tail.txt
          git commit -m 'ci: capture T004 closeout validation diagnostic'
          git push origin HEAD:tasks/repoground-t004-closeout-v1
