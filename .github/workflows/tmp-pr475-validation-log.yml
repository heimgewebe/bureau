name: temporary-pr475-final-diff

on: [push, pull_request]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build final review diff
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          output="bureau-pr475-${GITHUB_SHA}.diff"
          git diff --binary origin/main...HEAD -- . \
            ':(exclude).github/workflows/tmp-pr475-validation-log.yml' > "$output"
          sha256sum "$output" > "$output.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: bureau-pr475-final-${{ github.sha }}
          path: |
            bureau-pr475-${{ github.sha }}.diff
            bureau-pr475-${{ github.sha }}.diff.sha256
          if-no-files-found: error
          retention-days: 7
