name: validate
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e '.[dev]'
      - run: make validate

  export-review-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build review diff
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          output="bureau-pr477-${GITHUB_SHA}.diff"
          git diff --binary origin/main...HEAD -- . \
            ':(exclude).github/workflows/validate.yml' > "$output"
          sha256sum "$output" > "$output.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: bureau-pr477-${{ github.sha }}
          path: |
            bureau-pr477-${{ github.sha }}.diff
            bureau-pr477-${{ github.sha }}.diff.sha256
          if-no-files-found: error
          retention-days: 7
